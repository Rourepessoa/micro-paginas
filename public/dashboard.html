<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — MicroPáginas</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">MicroPáginas</a>
    <button class="secondary" id="logout-btn">Sair</button>
  </nav>

  <div class="container wide">
    <div id="global-alert"></div>
    <div id="verify-banner"></div>

    <div class="share-url">
      <span>Sua página:</span>
      <code id="share-url-text">/u/...</code>
      <button class="secondary icon-only" id="copy-url-btn" type="button">Copiar</button>
      <a class="btn secondary" id="visit-url-link" href="#" target="_blank" rel="noopener">Visualizar</a>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="perfil">Perfil</button>
      <button class="tab-btn" data-tab="links">Links</button>
      <button class="tab-btn" data-tab="portfolio">Portfólio</button>
    </div>

    <!-- Perfil -->
    <div class="tab-panel active" id="tab-perfil">
      <div class="card">
        <h2>Editar perfil</h2>
        <div id="profile-alert"></div>
        <form id="profile-form">
          <label for="displayName">Nome de exibição</label>
          <input type="text" id="displayName" maxlength="80" />

          <label for="bio">Bio</label>
          <textarea id="bio" maxlength="280"></textarea>

          <label for="avatarUrl">URL da foto de perfil</label>
          <input type="url" id="avatarUrl" placeholder="https://..." />

          <label for="theme">Tema da página</label>
          <select id="theme">
            <option value="default">Padrão (roxo)</option>
            <option value="dark">Escuro</option>
            <option value="sunset">Pôr do sol</option>
            <option value="ocean">Oceano</option>
            <option value="forest">Floresta</option>
          </select>

          <div class="form-actions">
            <button type="submit">Salvar perfil</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Links -->
    <div class="tab-panel" id="tab-links">
      <div class="card">
        <h2>Adicionar link</h2>
        <div id="link-alert"></div>
        <form id="link-form">
          <label for="link-title">Título</label>
          <input type="text" id="link-title" maxlength="100" placeholder="Meu Instagram" required />

          <label for="link-url">URL</label>
          <input type="url" id="link-url" placeholder="https://instagram.com/voce" required />

          <div class="form-actions">
            <button type="submit">Adicionar link</button>
          </div>
        </form>
      </div>

      <div id="links-list"></div>
    </div>

    <!-- Portfólio -->
    <div class="tab-panel" id="tab-portfolio">
      <div class="card">
        <h2>Adicionar item ao portfólio</h2>
        <div id="portfolio-alert"></div>
        <form id="portfolio-form">
          <label for="pf-title">Título</label>
          <input type="text" id="pf-title" maxlength="100" required />

          <label for="pf-description">Descrição</label>
          <textarea id="pf-description" maxlength="500"></textarea>

          <label for="pf-url">Link do projeto (opcional)</label>
          <input type="url" id="pf-url" placeholder="https://..." />

          <label for="pf-image">URL da imagem (opcional)</label>
          <input type="url" id="pf-image" placeholder="https://..." />

          <div class="form-actions">
            <button type="submit">Adicionar ao portfólio</button>
          </div>
        </form>
      </div>

      <div id="portfolio-list"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
